<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS ROOM GREEN PRAMUKA</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:20px;
}

.info{
background:#f0f8ff;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>

</head>

<body>

<div class="container">

<h1>🏢 DS ROOM</h1>

<div class="subtitle">
Apartemen Green Pramuka Jakarta Pusat
</div>

<div class="info">
✅ Transit Mulai 2 Jam<br>
✅ Harian & Mingguan<br>
✅ Full Furnished<br>
✅ AC & TV<br>
✅ Water Heater<br>
✅ Dekat Mall Green Pramuka Square
</div>

<label>Nama Pemesan</label> <input type="text" id="nama" placeholder="Masukkan Nama">

<label>Tipe Unit</label> <select id="unit">

<option>Studio</option>
<option>2 Bedroom</option>
<option>3 Bedroom</option>
</select>

<label>Tanggal Check In</label> <input type="date" id="tanggal">

<label>Pilih Paket</label> <select id="paket">

<option>2 Jam - Rp100.000</option>
<option>3 Jam + Free 1 Jam - Rp150.000</option>
<option>6 Jam + Free 1 Jam - Rp200.000</option>
<option>9 Jam + Free 1 Jam - Rp250.000</option>
<option>12 Jam + Free 1 Jam - Rp300.000</option>
</select>

<label>Catatan</label>

<textarea id="catatan" rows="4"></textarea>

<button onclick="booking()">
Booking Via WhatsApp
</button>

</div>

<script>

function booking(){

let nama = document.getElementById("nama").value;
let unit = document.getElementById("unit").value;
let tanggal = document.getElementById("tanggal").value;
let paket = document.getElementById("paket").value;
let catatan = document.getElementById("catatan").value;

let pesan =
`Halo Admin DS ROOM

Saya ingin booking:

Nama: ${nama}
Tipe Unit: ${unit}
Tanggal Check In: ${tanggal}
Paket: ${paket}

Catatan:
${catatan}`;

window.open(
"https://wa.me/62881025212183?text=" +
encodeURIComponent(pesan),
"_blank"
);

}

</script>

</body>
</html>
